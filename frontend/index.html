<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin Toko - Kelompok</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8f9fa;
      color: #333333;
    }
    .navbar {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .card {
      border: none;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .card-stats {
      background: #ffffff;
      border-left: 5px solid #3b82f6;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.15);
    }
    .btn {
      border-radius: 8px;
      font-weight: 500;
    }
    .table th {
      background-color: #f1f5f9;
      color: #475569;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }
    .table td {
      vertical-align: middle;
      font-size: 0.9rem;
    }
    .badge-stock {
      font-size: 0.75rem;
      padding: 0.35em 0.65em;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <i class="fa-solid : fa-store text-info fs-4"></i>
        <span class="fw-bold text-white">TokoOnline <span class="text-info">Admin</span></span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light small d-none d-sm-inline"><i class="fa-solid fa-user-circle me-1"></i> Anggota Kelompok</span>
        <button class="btn btn-outline-danger btn-sm px-3" onclick="logout()">
          <i class="fa-solid fa-sign-out-alt me-1"></i> Keluar
        </button>
      </div>
    </div>
  </nav>

  <div class="container my-4">
    
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="card card-stats shadow-sm p-3">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <p class="text-muted small mb-1 fw-medium">Total Jenis Produk</p>
              <h3 class="fw-bold mb-0" id="statTotalItems">0</h3>
            </div>
            <div class="bg-primary bg-opacity-10 p-3 rounded-3 text-primary">
              <i class="fa-solid fa-box fs-4"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-stats shadow-sm p-3" style="border-left-color: #10b981;">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <p class="text-muted small mb-1 fw-medium">Total Stok Barang</p>
              <h3 class="fw-bold mb-0" id="statTotalStock">0</h3>
            </div>
            <div class="bg-success bg-opacity-10 p-3 rounded-3 text-success">
              <i class="fa-solid fa-boxes-stacked fs-4"></i>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-stats shadow-sm p-3" style="border-left-color: #f59e0b;">
          <div class="d-flex align-items-center justify-content-between">
            <div>
              <p class="text-muted small mb-1 fw-medium">Estimasi Nilai Aset</p>
              <h3 class="fw-bold mb-0" id="statTotalValue">Rp 0</h3>
            </div>
            <div class="bg-warning bg-opacity-10 p-3 rounded-3 text-warning">
              <i class="fa-solid fa-wallet fs-4"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm p-4 bg-white">
          <div class="d-flex align-items-center gap-2 mb-3">
            <div class="p-2 bg-light rounded text-secondary" id="formIcon">
              <i class="fa-solid fa-plus-circle fs-5"></i>
            </div>
            <h5 class="fw-bold mb-0" id="formTitle">Tambah Produk Baru</h5>
          </div>
          <hr class="text-muted mt-0 mb-3">
          
          <form id="pForm">
            <input type="hidden" id="pId">
            
            <div class="mb-3">
              <label class="form-label small fw-semibold text-secondary">Nama Produk</label>
              <div class="input-group input-group-merge">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-tag small"></i></span>
                <input type="text" id="pName" class="form-control border-start-0 ps-0" placeholder="Contoh: Sepatu Running" required>
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label small fw-semibold text-secondary">Harga Produk (Rupiah)</label>
              <div class="input-group">
                <span class="input-group-text bg-light text-muted fw-medium small">Rp</span>
                <input type="number" id="pPrice" class="form-control" placeholder="0" required>
              </div>
            </div>
            
            <div class="mb-4">
              <label class="form-label small fw-semibold text-secondary">Stok Awal</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-layer-group small"></i></span>
                <input type="number" id="pStock" class="form-control border-start-0 ps-0" placeholder="0" required>
              </div>
            </div>
            
            <div class="d-flex gap-2">
              <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2"><i class="fa-solid fa-save me-1"></i> Simpan</button>
              <button type="button" id="cancelBtn" class="btn btn-light border w-50 py-2 d-none" onclick="resetForm()">Batal</button>
            </div>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm p-4 bg-white h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0 text-dark"><i class="fa-solid fa-list-check me-2 text-primary"></i>Kelola Data Inventaris</h5>
            <button class="btn btn-light btn-sm border text-secondary" onclick="loadProducts()"><i class="fa-solid fa-rotate me-1"></i> Refresh</button>
          </div>
          
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr>
                  <th scope="col" class="px-3">Nama Produk</th>
                  <th scope="col">Harga Satuan</th>
                  <th scope="col" class="text-center">Stok</th>
                  <th scope="col" class="text-end px-3">Tindakan Kelola</th>
                </tr>
              </thead>
              <tbody id="pTable">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    // 1. Ambil & Hitung Data (GET + Kalkulasi Statistik)
    async function loadProducts() {
      const r = await fetch('http://localhost:5000/api/products');
      const products = await r.json();
      const tbody = document.getElementById('pTable');
      tbody.innerHTML = '';
      
      let totalItems = products.length;
      let totalStock = 0;
      let totalValue = 0;

      if (totalItems === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4"><i class="fa-regular fa-folder-open fs-2 d-block mb-2"></i>Belum ada data barang. Silakan tambah di form kiri.</td></tr>`;
      }

      products.forEach(p => {
        totalStock += p.stock;
        totalValue += (p.price * p.stock);

        // Badge indikator stok dinamis
        let stockBadge = `<span class="badge bg-success bg-opacity-10 text-success badge-stock">${p.stock} Pcs</span>`;
        if(p.stock <= 0) {
          stockBadge = `<span class="badge bg-danger bg-opacity-10 text-danger badge-stock">Habis</span>`;
        } else if (p.stock <= 5) {
          stockBadge = `<span class="badge bg-warning bg-opacity-10 text-warning badge-stock">Tipis: ${p.stock}</span>`;
        }

        tbody.innerHTML += `
          <tr>
            <td class="fw-semibold text-dark px-3">${p.name}</td>
            <td class="text-secondary fw-medium">Rp ${p.price.toLocaleString('id-ID')}</td>
            <td class="text-center">${stockBadge}</td>
            <td class="text-end px-3">
              <div class="btn-group gap-1">
                <button class="btn btn-outline-success btn-sm px-2" title="Simulasi Pembelian" onclick="buyProduct(${p.id})"><i class="fa-solid fa-shopping-cart"></i> Beli</button>
                <button class="btn btn-outline-warning btn-sm px-2" title="Ubah Data" onclick="editProduct(${p.id}, '${p.name}', ${p.price}, ${p.stock})"><i class="fa-solid fa-pen"></i></button>
                <button class="btn btn-outline-danger btn-sm px-2" title="Hapus Data" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i></button>
              </div>
            </td>
          </tr>`;
      });

      // Update Tampilan Kotak Statistik Atas
      document.getElementById('statTotalItems').innerText = totalItems;
      document.getElementById('statTotalStock').innerText = totalStock + " Pcs";
      document.getElementById('statTotalValue').innerText = "Rp " + totalValue.toLocaleString('id-ID');
    }

    // 2. Klik Tombol Edit (Aktivasi Mode PUT)
    function editProduct(id, name, price, stock) {
      document.getElementById('pId').value = id;
      document.getElementById('pName').value = name;
      document.getElementById('pPrice').value = price;
      document.getElementById('pStock').value = stock;

      // Animasi UI berubah menjadi oranye (Peringatan Update)
      document.getElementById('formTitle').innerText = "Ubah Data Produk (PUT)";
      document.getElementById('formIcon').innerHTML = `<i class="fa-solid fa-pen-to-square fs-5"></i>`;
      document.getElementById('formIcon').className = "p-2 bg-warning bg-opacity-10 text-warning rounded";
      
      document.getElementById('submitBtn').innerHTML = `<i class="fa-solid fa-sync me-1"></i> Terapkan Perubahan`;
      document.getElementById('submitBtn').className = "btn btn-warning text-white w-100 py-2";
      document.getElementById('cancelBtn').classList.remove('d-none');
    }

    // 3. Reset Formulir (Kembali ke Mode POST)
    function resetForm() {
      document.getElementById('pForm').reset();
      document.getElementById('pId').value = '';
      
      document.getElementById('formTitle').innerText = "Tambah Produk Baru";
      document.getElementById('formIcon').innerHTML = `<i class="fa-solid fa-plus-circle fs-5"></i>`;
      document.getElementById('formIcon').className = "p-2 bg-light rounded text-secondary";
      
      document.getElementById('submitBtn').innerHTML = `<i class="fa-solid fa-save me-1"></i> Simpan`;
      document.getElementById('submitBtn').className = "btn btn-primary w-100 py-2";
      document.getElementById('cancelBtn').classList.add('d-none');
    }

    // 4. Pengiriman Data Form (Otomatis Deteksi POST / PUT)
    document.getElementById('pForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('pId').value;
      const name = document.getElementById('pName').value;
      const price = document.getElementById('pPrice').value;
      const stock = document.getElementById('pStock').value;

      let url = 'http://localhost:5000/api/products';
      let method = 'POST';

      if (id) {
        url = `http://localhost:5000/api/products/${id}`;
        method = 'PUT';
      }

      const response = await fetch(url, {
        method: method,
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ name, price, stock })
      });

      if (response.ok) {
        resetForm();
        loadProducts();
      } else {
        const errData = await response.json();
        alert('Gagal mengeksekusi operasi: ' + errData.message);
      }
    });

    // 5. Fungsi Hapus Data (DELETE)
    async function deleteProduct(id) {
      if(confirm('Apakah kelompok Anda yakin ingin menghapus permanen data produk ini?')) {
        await fetch(`http://localhost:5000/api/products/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        loadProducts();
      }
    }

    // 6. Fungsi Simulasi Pembelian (Mengurangi Stok & Masuk Tabel Order)
    async function buyProduct(id) {
      const r = await fetch('http://localhost:5000/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ productId: id, quantity: 1 })
      });
      const d = await r.json();
      alert(d.message);
      loadProducts();
    }

    // Load pertama kali saat halaman siap dibuka
    loadProducts();
  </script>
</body>
</html>
