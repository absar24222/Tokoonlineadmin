<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun - TokoOnline Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-card {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }
    .brand-logo {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    .btn-register {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-register:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
  </style>
</head>
<body>

  <div class="container m-3" style="max-width: 420px;">
    <div class="card register-card p-4 p-sm-5">
      
      <div class="text-center">
        <div class="brand-logo">
          <i class="fa-solid fa-user-plus fs-4"></i>
        </div>
        <h4 class="fw-bold text-dark mb-1">Registrasi Admin</h4>
        <p class="text-muted small mb-4">Buat akun untuk mengelola sistem inventaris</p>
      </div>

      <form id="regForm">
        <div class="mb-3">
          <label class="form-label small fw-semibold text-secondary">Nama Pengguna (Username)</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fa-solid fa-user" style="position: absolute; left: 15px; color: #94a3b8; z-index: 10;"></i>
            <input type="text" id="username" class="form-control" placeholder="contoh: kelompok1" style="padding: 10px 12px 10px 42px; border-radius: 10px;" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold text-secondary">Alamat Email</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fa-solid fa-envelope" style="position: absolute; left: 15px; color: #94a3b8; z-index: 10;"></i>
            <input type="email" id="email" class="form-control" placeholder="nama@email.com" style="padding: 10px 12px 10px 42px; border-radius: 10px;" required>
          </div>
        </div>
        
        <div class="mb-4">
          <label class="form-label small fw-semibold text-secondary">Kata Sandi</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fa-solid fa-lock" style="position: absolute; left: 15px; color: #94a3b8; z-index: 10;"></i>
            <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter" style="padding: 10px 12px 10px 42px; border-radius: 10px;" required>
          </div>
        </div>

        <button type="submit" class="btn btn-success btn-register w-100 mb-3">
          <i class="fa-solid fa-user-check me-2"></i> Buat Akun Baru
        </button>
      </form>

      <div class="text-center mt-2">
        <p class="text-muted small mb-0">Sudah punya akun? <a href="login.html" class="text-success fw-semibold text-decoration-none">Masuk di sini</a></p>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const response = await fetch('http://localhost:5000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      if (response.ok) { 
        alert('Registrasi Berhasil! Silakan masuk.'); 
        window.location.href = 'login.html'; 
      } else { 
        const d = await response.json(); 
        alert('Gagal: ' + d.message); 
      }
    });
  </script>
</body>
</html>
