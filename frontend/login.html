<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - TokoOnline Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }
    .brand-logo {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      width: 60px;
      height: 60px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    .btn-login {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body>

  <div class="container m-3" style="max-width: 420px;">
    <div class="card login-card p-4 p-sm-5">
      
      <div class="text-center">
        <div class="brand-logo">
          <i class="fa-solid fa-store fs-3"></i>
        </div>
        <h4 class="fw-bold text-dark mb-1">Selamat Datang</h4>
        <p class="text-muted small mb-4">Silakan masuk ke akun admin kelompok Anda</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label small fw-semibold text-secondary">Alamat Email</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fa-solid fa-envelope" style="position: absolute; left: 15px; color: #94a3b8; z-index: 10;"></i>
            <input type="email" id="email" class="form-control" placeholder="nama@email.com" style="padding: 10px 12px 10px 42px; border-radius: 10px;" required>
          </div>
        </div>
        
        <div class="mb-4">
          <label class="form-label small fw-semibold text-secondary">Kata Sandi</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fa-solid fa-lock" style="position: absolute; left: 15px; color: #94a3b8; z-index: 10;"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" style="padding: 10px 12px 10px 42px; border-radius: 10px;" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100 mb-3">
          <i class="fa-solid fa-right-to-bracket me-2"></i> Masuk Sekarang
        </button>
      </form>

      <div class="text-center mt-2">
        <p class="text-muted small mb-0">Belum memiliki akun? <a href="register.html" class="text-primary fw-semibold text-decoration-none">Daftar Tim</a></p>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const response = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await response.json();
      if (response.ok) { 
        localStorage.setItem('token', data.token); 
        window.location.href = 'index.html'; 
      } else { 
        alert(data.message); 
      }
    });
  </script>
</body>
</html>
